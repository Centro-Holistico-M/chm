<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Centro Holístico M</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <!-- Header con Logo y Slogan -->
        <header class="header">
            <div class="logo-section">
                <img id="logo" class="logo" alt="Logo Centro Holístico" src="">
                <div class="brand-info">
                    <h1 id="nombre-centro" class="nombre-centro">Centro Holístico M</h1>
                    <p id="slogan" class="slogan">La sanación comienza cuando te escuchas</p>
                </div>
            </div>
        </header>

        <!-- Navegación con Botones -->
        <nav class="navigation">
            <button class="nav-btn active" data-section="horarios">📅 Horarios</button>
            <button class="nav-btn" data-section="servicios">💆 Servicios</button>
            <button class="nav-btn" data-section="contacto">📞 Contacto</button>
        </nav>

        <!-- Contenedor de Secciones -->
        <main class="content">
            <!-- Sección Horarios -->
            <section id="horarios" class="section active">
                <h2>Nuestros Horarios</h2>
                <div id="horarios-container" class="horarios-grid">
                    <div class="loading">Cargando horarios...</div>
                </div>
            </section>

            <!-- Sección Servicios -->
            <section id="servicios" class="section">
                <h2>Nuestros Servicios</h2>
                <div id="servicios-container" class="servicios-grid">
                    <div class="loading">Cargando servicios...</div>
                </div>
            </section>

            <!-- Sección Contacto -->
            <section id="contacto" class="section">
                <h2>Contacto e Información</h2>
                <div id="contacto-container" class="contacto-grid">
                    <div class="loading">Cargando información...</div>
                </div>
            </section>
        </main>

        <!-- Footer -->
        <footer class="footer">
            <p>&copy; 2026 Centro Holístico M. Todos los derechos reservados.</p>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
