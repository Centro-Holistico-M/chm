<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Centro Holístico M</title>
    <meta name="description" content="Centro Holístico M">
    <meta name="theme-color" content="#0a0a0a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Centro Holístico M">
    <link rel="manifest" href="images/manifest.json">
    <link rel="icon" type="image/png" href="images/logo.png">
    <link rel="apple-touch-icon" href="images/icon-192.png">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css?v=65">
</head>
<body>
    <!-- Splash solo para fondo y partículas -->
    <div id="splash" class="splash">
        <div class="splash-aura"></div>
        <div class="splash-particles" id="splash-particles"></div>
    </div>

    <!-- Contenedor Principal Flexbox -->
    <div class="app-container">
        <!-- Header: Logo + Slogan -->
        <header class="app-header">
            <div id="fusion-logo" class="fusion-logo" onclick="irADescodificacion()">
                <img src="images/logo.png" alt="Centro Holístico M">
            </div>
            <p class="slogan" id="slogan"></p>
        </header>

        <!-- Botones de Navegación -->
        <nav class="nav">
            <button class="nav-btn active" data-tab="horarios">Horarios</button>
            <button class="nav-btn" data-tab="servicios">Eventos</button>
            <button class="nav-btn" data-tab="contacto">Contacto</button>
        </nav>

        <!-- Contenido de Secciones -->
        <main class="content">
            <section id="horarios" class="tab-content active">
                <div id="horarios-container"></div>
            </section>
            <section id="servicios" class="tab-content">
                <div id="servicios-container"></div>
            </section>
            <section id="descodificacion" class="tab-content">
                <div id="descodificacion-container"></div>
            </section>
            <section id="contacto" class="tab-content">
                <div id="contacto-container"></div>
            </section>
        </main>

        <!-- Footer -->
        <footer class="footer">
            <p>© 2026 Centro Holístico M. Todos los derechos reservados 🄼</p>
        </footer>
    </div>

    <div class="bg-aura"></div>
    <div class="particles" id="particles"></div>

    <div id="loading" class="loading" style="display:none;">
        <div class="spinner"></div>
    </div>

    <script src="app.js?v=59"></script>
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('images/sw.js')
                    .then(reg => console.log('✅ SW registrado:', reg.scope))
                    .catch(err => console.log('❌ SW error:', err));
            });
        }
    </script>
</body>
</html>
