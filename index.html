<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Centro Holístico M</title>
    <meta name="description" content="Centro Holístico M — Yoga, Taekwondo, talleres de sanación y bienestar integral">
    <meta name="theme-color" content="#0a0a0a">
    <link rel="manifest" href="images/manifest.json">
    <link rel="icon" type="image/png" href="images/logo.png">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- Header Fijo -->
    <header class="header">
        <img src="images/logo.png" alt="Centro Holístico M" class="logo">
        <p class="slogan" id="slogan"></p>
    </header>

    <!-- Navegación Fija -->
    <nav class="nav">
        <button class="nav-btn active" data-tab="horarios">Horarios</button>
        <button class="nav-btn" data-tab="servicios">Servicios</button>
        <button class="nav-btn" data-tab="contacto">Contacto</button>
    </nav>

    <!-- Contenido Principal -->
    <main class="content">
        <!-- Horarios -->
        <section id="horarios" class="tab-content active">
            <h2 class="section-title">Horario Semanal</h2>
            <div id="horarios-grid" class="grid"></div>
        </section>

        <!-- Servicios -->
        <section id="servicios" class="tab-content">
            <h2 class="section-title">Nuestros Servicios</h2>
            <div id="servicios-grid" class="grid"></div>
        </section>

        <!-- Contacto -->
        <section id="contacto" class="tab-content">
            <h2 class="section-title">Contacto</h2>
            <div id="contacto-card" class="card"></div>
        </section>
    </main>

    <!-- Loading -->
    <div id="loading" class="loading" style="display:none;">
        <div class="spinner"></div>
    </div>

    <script src="app.js"></script>
</body>
</html>
